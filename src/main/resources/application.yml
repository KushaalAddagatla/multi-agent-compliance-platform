server:
  port: 8080

spring:
  application:
    name: compliance-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/compliance
    username: compliance
    password: compliance
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 4096
          temperature: 0.1

    openai:
      api-key: ${OPENAI_API_KEY}
      # Disable OpenAI chat — Claude is the chat model
      chat:
        enabled: false
      embedding:
        options:
          model: text-embedding-ada-002

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    reports-bucket: ${S3_REPORTS_BUCKET:compliance-reports}
  sqs:
    scan-queue-url: ${SQS_SCAN_QUEUE_URL:}
  ses:
    from-email: ${SES_FROM_EMAIL:}
    to-email: ${SES_TO_EMAIL:}

ingestion:
  # Directory where compliance framework PDFs are stored.
  # Download NIST 800-53 Rev 5 from csrc.nist.gov and CIS AWS Benchmark from cisecurity.org,
  # then place them in this directory before calling POST /api/ingestion/preview.
  pdf-dir: ${PDF_DIR:${user.home}/compliance-docs}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.compliance.platform: DEBUG
    org.springframework.ai: INFO
